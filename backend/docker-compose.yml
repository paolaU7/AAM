version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aam_postgres
    environment:
      POSTGRES_USER: aam_user
      POSTGRES_PASSWORD: aam_password
      POSTGRES_DB: aam_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aam_user -d aam_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
